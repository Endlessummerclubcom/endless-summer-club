<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Endless Summer Club</title>
  <meta name="description" content="A new swimwear brand. Coming soon.">
  <meta property="og:title" content="Endless Summer Club">
  <meta property="og:description" content="Coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --silence:  #EDE4D7;
      --ice:      #C8DCE8;
      --merlot:   #5C1420;
      --dark:     #1C1412;
      --muted:    #8a7f78;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--silence);
      color: var(--dark);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      padding: 32px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--dark);
    }

    .badge {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 80px;
      text-align: center;
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--merlot);
      margin-bottom: 32px;
      opacity: 0.8;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(52px, 11vw, 96px);
      line-height: 0.95;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--dark);
      margin-bottom: 28px;
    }

    h1 em {
      font-style: italic;
      color: var(--merlot);
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-bottom: 56px;
    }

    /* ── DIVIDER ── */
    .rule {
      width: 1px;
      height: 40px;
      background: var(--merlot);
      opacity: 0.25;
      margin: 0 auto 52px;
    }

    /* ── FORM ── */
    .form-caption {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .form-wrap {
      display: flex;
      max-width: 400px;
      width: 100%;
    }

    .form-wrap input[type="email"] {
      flex: 1;
      padding: 15px 20px;
      border: 1px solid rgba(92,20,32,0.22);
      border-right: none;
      border-radius: 2px 0 0 2px;
      background: rgba(255,255,255,0.45);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .form-wrap input[type="email"]::placeholder {
      color: #b5a89e;
      font-style: italic;
    }

    .form-wrap input[type="email"]:focus {
      background: rgba(255,255,255,0.7);
      border-color: rgba(92,20,32,0.45);
    }

    .form-wrap button {
      padding: 15px 26px;
      background: var(--merlot);
      color: var(--silence);
      border: 1px solid var(--merlot);
      border-radius: 0 2px 2px 0;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .form-wrap button:hover {
      background: var(--dark);
      border-color: var(--dark);
    }

    .success-msg {
      display: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-style: italic;
      font-weight: 300;
      color: var(--merlot);
      letter-spacing: 0.04em;
    }

    /* ── COLOR SWATCHES ── */
    .swatches {
      display: flex;
      gap: 10px;
      margin-top: 52px;
      align-items: center;
      justify-content: center;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    /* ── FOOTER ── */
    footer {
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 1px solid rgba(92,20,32,0.1);
    }

    footer span {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── BACKGROUND PATTERN ── */
    #bg-pattern {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    #bg-pattern .icon {
      position: absolute;
      width: 76px;
      height: 76px;
      opacity: 0.13;
    }
    header, main, footer { position: relative; z-index: 1; }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      header { padding: 24px 20px; }
      .form-wrap { flex-direction: column; }
      .form-wrap input[type="email"] {
        border-right: 1px solid rgba(92,20,32,0.22);
        border-bottom: none;
        border-radius: 2px 2px 0 0;
      }
      .form-wrap button {
        border-radius: 0 0 2px 2px;
        padding: 15px;
      }
    }
  </style>
</head>
<body>

  <div id="bg-pattern"></div>

  <header>
    <span class="logo">Endless Summer Club</span>
    <span class="badge">Est. 2026</span>
  </header>

  <main>
    <p class="eyebrow">New collection arriving</p>

    <h1>Endless<br><em>Summer</em><br>Club</h1>

    <p class="tagline">Coming soon.</p>

    <div class="swatches">
      <div class="swatch" style="background:#EDE4D7; outline: 1px solid #c9bfb5;"></div>
      <div class="swatch" style="background:#C8DCE8;"></div>
      <div class="swatch" style="background:#5C1420;"></div>
    </div>
  </main>

  <footer>
    <span>© 2026 Endless Summer Club</span>
  </footer>


  <script>
    const MERLOT = '#5C1420'
    const S = `stroke="${MERLOT}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"`

    // 5 icon types
    const icons = [

      // SCALLOP SHELL
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 76 76">
        <g ${S}>
          <path d="M38,65 C18,65 6,52 6,38 C6,22 18,10 38,10 C58,10 70,22 70,38 C70,52 58,65 38,65 Z"/>
          <line x1="38" y1="65" x2="10" y2="26"/>
          <line x1="38" y1="65" x2="18" y2="13"/>
          <line x1="38" y1="65" x2="30" y2="10"/>
          <line x1="38" y1="65" x2="38" y2="10"/>
          <line x1="38" y1="65" x2="46" y2="10"/>
          <line x1="38" y1="65" x2="58" y2="13"/>
          <line x1="38" y1="65" x2="66" y2="26"/>
          <path d="M14,50 Q38,58 62,50"/>
          <path d="M10,38 Q38,50 66,38"/>
        </g>
      </svg>`,

      // SPIRAL SHELL (nautilus)
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 76 76">
        <g ${S}>
          <path d="M38,8 C57,8 68,21 68,38 C68,55 55,68 38,68 C21,68 8,55 8,38 C8,25 16,15 27,11"/>
          <path d="M38,18 C52,18 58,27 58,38 C58,49 50,58 39,57"/>
          <path d="M38,28 C46,28 50,33 50,38 C50,44 46,49 40,48"/>
          <path d="M38,35 C41,35 43,37 43,39"/>
          <circle cx="38" cy="38" r="3" fill="${MERLOT}" stroke="none"/>
          <path d="M27,11 C23,13 21,18 23,23"/>
        </g>
      </svg>`,

      // PALM TREE
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 76 76">
        <g ${S}>
          <path d="M38,72 C36,60 34,48 37,38 C39,28 37,20 34,12"/>
          <path d="M34,12 C26,5 12,8 8,18"/>
          <path d="M34,12 C42,4 56,6 62,16"/>
          <path d="M34,12 C24,15 16,24 14,34"/>
          <path d="M34,12 C46,17 52,28 48,38"/>
          <path d="M34,12 C29,9 22,13 18,20"/>
          <circle cx="28" cy="26" r="5"/>
          <circle cx="36" cy="22" r="5"/>
        </g>
      </svg>`,

      // SEA TURTLE
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 76 76">
        <g ${S}>
          <ellipse cx="38" cy="42" rx="22" ry="18"/>
          <path d="M38,24 L38,60"/>
          <path d="M16,42 L60,42"/>
          <path d="M22,28 L54,56"/>
          <path d="M54,28 L22,56"/>
          <ellipse cx="38" cy="18" rx="7" ry="6"/>
          <path d="M31,24 L33,27"/>
          <path d="M45,24 L43,27"/>
          <path d="M17,34 C8,28 6,18 10,12"/>
          <path d="M59,34 C68,28 70,18 66,12"/>
          <path d="M18,52 C10,58 9,66 14,70"/>
          <path d="M58,52 C66,58 67,66 62,70"/>
        </g>
      </svg>`,

      // COCONUTS
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 76 76">
        <g ${S}>
          <circle cx="38" cy="44" r="13"/>
          <path d="M30,34 C32,29 36,27 38,27"/>
          <path d="M46,34 C44,29 40,27 38,27"/>
          <path d="M27,46 C26,41 27,37 30,34"/>
          <path d="M49,46 C50,41 49,37 46,34"/>
          <path d="M38,31 L38,26 M32,22 L38,26 L44,22"/>
          <circle cx="22" cy="52" r="10"/>
          <path d="M16,45 C18,40 21,38 22,38"/>
          <path d="M28,45 C26,40 23,38 22,38"/>
          <circle cx="54" cy="52" r="10"/>
          <path d="M48,45 C50,40 53,38 54,38"/>
          <path d="M60,45 C58,40 55,38 54,38"/>
        </g>
      </svg>`,
    ]

    function buildPattern() {
      const container = document.getElementById('bg-pattern')
      const W = window.innerWidth
      const H = window.innerHeight + 300
      const SPACING = 265  // ~7cm at 96dpi
      const ICON_SIZE = 76

      // stagger rows for natural scattered look
      const offsets = [[0,0],[132,0],[66,133],[198,133],[33,200]]

      let html = ''
      let idx = 0

      for (let row = -1; row * SPACING < H + SPACING; row++) {
        for (let col = -1; col * SPACING < W + SPACING; col++) {
          const off = offsets[idx % offsets.length]
          const x = col * SPACING + off[0] - ICON_SIZE/2
          const y = row * SPACING + off[1] - ICON_SIZE/2
          // rotate slightly for variety
          const rot = (idx * 37) % 360
          html += `<div class="icon" style="left:${x}px;top:${y}px;transform:rotate(${rot}deg)">${icons[idx % icons.length]}</div>`
          idx++
        }
      }
      container.innerHTML = html
    }

    buildPattern()
    window.addEventListener('resize', buildPattern)
  </script>

</body>
</html>
